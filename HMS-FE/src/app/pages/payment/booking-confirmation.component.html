<div class="relative z-10 flex min-h-screen w-full flex-col bg-background-light dark:bg-background-dark">
  <div class="layout-container flex h-full grow flex-col items-center justify-center p-6 sm:p-12">
    <header class="mb-10 flex flex-col items-center gap-2 cursor-pointer" routerLink="/">
      <div class="size-12 text-primary">
        <span class="material-symbols-outlined text-5xl">hotel_class</span>
      </div>
      <h2 class="text-3xl font-bold tracking-tight text-primary">Luxecore</h2>
    </header>

    <div class="glassmorphism flex w-full max-w-2xl flex-col rounded-2xl p-8 sm:p-12 shadow-2xl">
      <div class="flex flex-col items-center text-center gap-4">
        <div *ngIf="isLoading" class="flex h-20 w-20 items-center justify-center rounded-full bg-primary/10 text-primary">
          <div class="h-10 w-10 animate-spin rounded-full border-4 border-primary border-t-transparent"></div>
        </div>
        <div *ngIf="!isLoading && !errorMessage" class="flex h-20 w-20 items-center justify-center rounded-full bg-green-100 text-green-600">
          <span class="material-symbols-outlined text-5xl">check_circle</span>
        </div>
        <div *ngIf="errorMessage" class="flex h-20 w-20 items-center justify-center rounded-full bg-red-100 text-red-600">
          <span class="material-symbols-outlined text-5xl">error</span>
        </div>

        <h1 class="text-3xl sm:text-4xl font-black leading-tight tracking-tight text-slate-900 dark:text-white">
          <ng-container *ngIf="!errorMessage">Payment return</ng-container>
          <ng-container *ngIf="errorMessage">Payment not confirmed</ng-container>
        </h1>

        <p *ngIf="isLoading" class="text-slate-600 dark:text-slate-300 text-lg">
          Payment successful. Waiting for confirmation...
        </p>
        <p *ngIf="!isLoading && !errorMessage" class="text-slate-600 dark:text-slate-300 text-lg">
          Booking confirmed. Redirecting to My Bookings...
        </p>
        <p *ngIf="errorMessage" class="text-red-600 text-lg">
          {{ errorMessage }}
        </p>
      </div>

      <div class="mt-8 rounded-xl bg-white/60 dark:bg-black/20 p-6 border border-slate-200/50 dark:border-slate-700/50">
        <div class="flex justify-between items-center border-b border-slate-200/50 dark:border-slate-700/50 pb-3">
          <p class="text-slate-600 dark:text-slate-300 font-medium">Booking ID</p>
          <p class="text-slate-900 dark:text-white font-bold">{{ bookingId || '-' }}</p>
        </div>
        <div class="mt-3 flex justify-between items-center border-b border-slate-200/50 dark:border-slate-700/50 pb-3">
          <p class="text-slate-600 dark:text-slate-300 font-medium">Status</p>
          <p class="font-bold"
             [ngClass]="{
               'text-yellow-600': statusText === 'PENDING',
               'text-green-600': statusText === 'CONFIRMED',
               'text-red-600': statusText === 'FAILED' || statusText === 'CANCELLED'
             }">
            {{ statusText || '-' }}
          </p>
        </div>
        <div class="mt-3 flex justify-between items-center" *ngIf="isLoading">
          <p class="text-slate-600 dark:text-slate-300 font-medium">Timeout</p>
          <p class="text-slate-900 dark:text-white font-bold">{{ secondsLeft }}s</p>
        </div>
      </div>

      <div class="mt-8 flex flex-col sm:flex-row gap-4 justify-center">
        <button routerLink="/my-bookings"
                class="flex-1 flex items-center justify-center rounded-lg h-12 px-6 bg-primary hover:bg-primary/90 text-slate-900 text-base font-bold shadow-lg shadow-primary/20 transition-all">
          View My Bookings
        </button>
        <button *ngIf="errorMessage" (click)="retryPolling()"
                class="flex-1 flex items-center justify-center rounded-lg h-12 px-6 border-2 border-slate-300 bg-transparent hover:bg-slate-100 text-slate-700 text-base font-bold transition-all">
          Retry
        </button>
      </div>
    </div>
  </div>
</div>
