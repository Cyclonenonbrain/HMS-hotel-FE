<header
  class="relative flex items-center justify-between whitespace-nowrap border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-8 py-4 z-10 shrink-0 shadow-sm"
>
  <div class="flex items-center gap-2">
    <a
      class="text-slate-500 dark:text-slate-400 text-sm font-medium leading-normal hover:text-primary transition-colors cursor-pointer"
      [routerLink]="['/admin/dashboard']"
      >Home</a
    >
    <span
      class="text-slate-400 dark:text-slate-500 text-sm font-medium leading-normal"
      >/</span
    >
    <span
      class="text-slate-900 dark:text-slate-100 text-sm font-medium leading-normal"
      >{{ currentBreadcrumb }}</span
    >
  </div>
  <div class="flex flex-1 justify-end items-center">
    <!-- User Profile Dropdown (Tương tự Landing Page) -->
    <div class="flex items-center gap-3 group relative cursor-pointer ml-4">
      <!-- User Info -->
      <div class="text-right hidden sm:block">
        <p class="text-xs font-bold text-slate-900 dark:text-slate-100">{{ user?.fullName || 'Admin User' }}</p>
        <p class="text-[10px] text-primary font-bold uppercase tracking-wider">{{ user?.role || 'ADMIN' }} Member</p>
      </div>

      <!-- Avatar Image -->
      <div class="size-10 rounded-full border-2 border-primary overflow-hidden shadow-sm transition-transform group-hover:scale-105">
        <img [src]="'https://ui-avatars.com/api/?name=' + (user?.fullName || 'Admin') + '&background=random&color=fff'"
            alt="User avatar">
      </div>

      <!-- Dropdown Menu -->
      <div class="absolute top-full right-0 pt-2 w-48 hidden group-hover:block drop-shadow-xl z-50">
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl py-2 shadow-lg animate-in fade-in slide-in-from-top-2">
            <div class="px-4 py-3 border-b border-slate-100 dark:border-slate-800 sm:hidden">
               <p class="text-sm font-bold text-slate-900 dark:text-slate-100">{{ user?.fullName || 'Admin User' }}</p>
               <p class="text-xs text-primary font-medium">{{ user?.role || 'ADMIN' }} Member</p>
            </div>
            <a class="flex items-center gap-2 px-4 py-2 hover:bg-slate-50 dark:hover:bg-slate-800 text-sm font-medium text-slate-700 dark:text-slate-300 transition-colors cursor-pointer">
              <span class="material-symbols-outlined text-[20px]">person</span>
              Profile
            </a>
            <a class="flex items-center gap-2 px-4 py-2 hover:bg-slate-50 dark:hover:bg-slate-800 text-sm font-medium text-slate-700 dark:text-slate-300 transition-colors cursor-pointer">
              <span class="material-symbols-outlined text-[20px]">settings</span>
              Settings
            </a>
            <hr class="my-1 border-slate-100 dark:border-slate-800">
            <button (click)="logout()"
                class="flex items-center gap-2 w-full text-left px-4 py-2 text-sm font-bold text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors">
                <span class="material-symbols-outlined text-[20px]">logout</span>
                Sign Out
            </button>
        </div>
      </div>
    </div>
  </div>
</header>
