<header
  class="relative flex items-center justify-between whitespace-nowrap border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-8 py-4 z-10 shrink-0 shadow-sm"
>
  <div class="flex items-center gap-2">
    <a
      class="text-slate-500 dark:text-slate-400 text-sm font-medium leading-normal hover:text-primary transition-colors cursor-pointer"
      [routerLink]="['/admin/dashboard']"
      >Home</a
    >
    <span
      class="text-slate-400 dark:text-slate-500 text-sm font-medium leading-normal"
      >/</span
    >
    <span
      class="text-slate-900 dark:text-slate-100 text-sm font-medium leading-normal"
      >{{ currentBreadcrumb }}</span
    >
  </div>
  <div class="flex flex-1 justify-end items-center gap-6">
    <label class="flex flex-col min-w-40 !h-10 max-w-sm w-full hidden md:flex">
      <div
        class="flex w-full flex-1 items-stretch rounded-lg h-full border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 overflow-hidden focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-shadow"
      >
        <div
          class="text-slate-400 dark:text-slate-500 flex items-center justify-center pl-4 pr-2"
        >
          <span class="material-symbols-outlined">search</span>
        </div>
        <input
          class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-0 border-none bg-transparent h-full placeholder:text-slate-400 dark:placeholder:text-slate-500 px-2 text-sm font-normal leading-normal"
          placeholder="Search..."
          value=""
        />
      </div>
    </label>
    <button
      class="flex items-center justify-center rounded-full size-10 hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500 dark:text-slate-400 transition-colors relative"
    >
      <span class="material-symbols-outlined">notifications</span>
      <span
        class="absolute top-2 right-2 size-2 bg-red-500 rounded-full border border-white dark:border-slate-900"
      ></span>
    </button>
    <div
      class="bg-center bg-no-repeat aspect-square bg-cover rounded-full size-10 border-2 border-slate-200 dark:border-slate-700 cursor-pointer"
      data-alt="User avatar profile picture"
      style="
        background-image: url(&quot;https://lh3.googleusercontent.com/aida-public/AB6AXuA-wYk7Q_t-OUwT5PxAWl1Qj5fsot-hKXSt_VcSmkUGfmhwngSOAeoq44s6CQEHSs4JcOgUkt6R9R384ITshu-VwGEsAwgMrcWwQzRCAyuwUTq6ttYWK3DlGdV7_FMBzMyJsitt3GHW2GBmebdeR4CnZa9apa6bnrbvYCL4HF0Uo2ZDYq9U3GO6n7uTILQ-ZuVvN3tmzt92TGDKcLa6G3wTr5yqFCWcad4bRV_T1e17-46QVNNGRmYmATO2BQJ6_hB7dP2IrZU2DWN4&quot;);
      "
    ></div>
  </div>
</header>
