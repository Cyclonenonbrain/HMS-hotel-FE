<div class="flex flex-col max-w-7xl mx-auto gap-8 p-6 md:p-8">
  <div
    *ngIf="notification"
    class="fixed top-6 right-6 z-[9999] px-4 py-3 rounded-lg border text-sm"
    [ngClass]="notification.type === 'success' ? 'bg-green-50 border-green-200 text-green-800' : 'bg-red-50 border-red-200 text-red-800'"
  >
    {{ notification.message }}
  </div>

  <div class="flex justify-between items-center">
    <div>
      <h1 class="text-2xl font-bold text-slate-900 dark:text-white">Amenities</h1>
      <p class="text-sm text-slate-500 dark:text-slate-400">Manage master amenities for room types.</p>
    </div>
    <button (click)="openAddModal()" class="px-4 py-2 bg-primary text-slate-900 rounded-lg font-medium">
      Add Amenity
    </button>
  </div>

  <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl overflow-hidden">
    <table class="w-full text-left">
      <thead class="bg-slate-50 dark:bg-slate-900/50 border-b border-slate-200 dark:border-slate-800">
        <tr>
          <th class="px-6 py-4 text-sm font-semibold">Code</th>
          <th class="px-6 py-4 text-sm font-semibold">Name</th>
          <th class="px-6 py-4 text-sm font-semibold text-right">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of amenities" class="border-b border-slate-100 dark:border-slate-800/50">
          <td class="px-6 py-4 font-mono text-sm">{{ item.code }}</td>
          <td class="px-6 py-4 text-sm">{{ item.name }}</td>
          <td class="px-6 py-4 text-right text-sm">
            <button (click)="openEditModal(item)" class="px-3 py-1.5 rounded hover:bg-primary/10 mr-2">Edit</button>
            <button (click)="openDeleteDialog(item)" class="px-3 py-1.5 rounded hover:bg-red-50 text-red-500">Delete</button>
          </td>
        </tr>
        <tr *ngIf="amenities.length === 0">
          <td colspan="3" class="px-6 py-8 text-center text-slate-500">No amenities found.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<div *ngIf="showModal" class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-slate-900/60" (click)="closeModal()"></div>
  <div class="relative bg-white dark:bg-slate-900 w-full max-w-md rounded-xl border border-slate-200 dark:border-slate-700 p-6">
    <h2 class="text-lg font-bold mb-4">{{ modalMode === 'add' ? 'Add Amenity' : 'Edit Amenity' }}</h2>
    <div class="space-y-4">
      <div>
        <label class="text-sm font-medium">Code</label>
        <input [(ngModel)]="formData.code" class="w-full mt-1 px-3 py-2 rounded border border-slate-300 dark:border-slate-700 bg-transparent" />
      </div>
      <div>
        <label class="text-sm font-medium">Name</label>
        <input [(ngModel)]="formData.name" class="w-full mt-1 px-3 py-2 rounded border border-slate-300 dark:border-slate-700 bg-transparent" />
      </div>
    </div>
    <div class="flex justify-end gap-2 mt-6">
      <button (click)="closeModal()" class="px-4 py-2 rounded border border-slate-300 dark:border-slate-700">Cancel</button>
      <button (click)="saveModal()" class="px-4 py-2 rounded bg-primary text-slate-900 font-medium">Save</button>
    </div>
  </div>
</div>

<div *ngIf="showDeleteDialog" class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-slate-900/60" (click)="closeDeleteDialog()"></div>
  <div class="relative bg-white dark:bg-slate-900 w-full max-w-sm rounded-xl border border-slate-200 dark:border-slate-700 p-6 text-center">
    <h2 class="text-lg font-bold mb-2">Delete Amenity?</h2>
    <p class="text-sm text-slate-500 mb-6">Delete "{{ amenityToDelete?.name }}"?</p>
    <div class="flex gap-2">
      <button (click)="closeDeleteDialog()" class="flex-1 px-4 py-2 rounded border border-slate-300 dark:border-slate-700">Cancel</button>
      <button (click)="confirmDelete()" class="flex-1 px-4 py-2 rounded bg-red-500 text-white">Delete</button>
    </div>
  </div>
</div>
